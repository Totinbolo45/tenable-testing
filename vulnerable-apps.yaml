# DVWA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dvwa
  namespace: tenable-lab
spec:
  replicas: 1
  selector: { matchLabels: { app: dvwa } }
  template:
    metadata: { labels: { app: dvwa } }
    spec:
      containers:
      - name: dvwa
        image: vulnerables/web-dvwa:latest
        ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata: { name: dvwa, namespace: tenable-lab }
spec:
  selector: { app: dvwa }
  ports: [{ port: 80, targetPort: 80 }]
---
