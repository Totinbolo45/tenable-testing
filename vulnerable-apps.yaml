# WebGoat
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webgoat
  namespace: tenable-lab
spec:
  replicas: 1
  selector: { matchLabels: { app: webgoat } }
  template:
    metadata: { labels: { app: webgoat } }
    spec:
      containers:
      - name: webgoat
        image: webgoat/goatandwolf:latest
        ports:
        - { containerPort: 8080 }
        - { containerPort: 9090 }
---
apiVersion: v1
kind: Service
metadata: { name: webgoat, namespace: tenable-lab }
spec:
  selector: { app: webgoat }
  ports:
  - { name: goat, port: 8080, targetPort: 8080 }
  - { name: wolf, port: 9090, targetPort: 9090 }
---
