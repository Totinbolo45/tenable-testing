# Plantilla para las credenciales de Nessus.
#
# Cópialo como `nessus-secret.yaml` y rellena los valores reales.
# El archivo `nessus-secret.yaml` está ignorado por Git (ver .gitignore).
#
# Aplícalo al clúster con:
#   kubectl apply -f nessus-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: nessus-credentials
  namespace: tenable-lab
  labels:
    app.kubernetes.io/part-of: tenable-lab
type: Opaque
stringData:
  username: "admin"
  password: "CHANGE-ME"
  activation-code: "YOUR-NESSUS-ACTIVATION-CODE"
