# Apache 2.2 (muchos CVEs)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: old-apache
  namespace: tenable-lab
spec:
  replicas: 1
  selector: { matchLabels: { app: old-apache } }
  template:
    metadata: { labels: { app: old-apache } }
    spec:
      containers:
      - name: apache
        image: httpd:2.2
        ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata: { name: old-apache, namespace: tenable-lab }
spec:
  selector: { app: old-apache }
  ports: [{ port: 80, targetPort: 80 }]
---
