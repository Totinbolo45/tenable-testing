# MySQL 5.5 (muchos CVEs + credenciales débiles a propósito)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: old-mysql
  namespace: tenable-lab
spec:
  replicas: 1
  selector: { matchLabels: { app: old-mysql } }
  template:
    metadata: { labels: { app: old-mysql } }
    spec:
      containers:
      - name: mysql
        image: mysql:5.5
        env:
        - { name: MYSQL_ROOT_PASSWORD, value: "root" }
        - { name: MYSQL_DATABASE, value: "testdb" }
        ports: [{ containerPort: 3306 }]
---
apiVersion: v1
kind: Service
metadata: { name: old-mysql, namespace: tenable-lab }
spec:
  selector: { app: old-mysql }
  ports: [{ port: 3306, targetPort: 3306 }]